; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = credentials.ini

[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sinricpro/SinricPro@^2.10.0
    links2004/WebSockets@^2.3.6

build_flags =
    -DWIFI_SSID=\"${credentials.WIFI_SSID}\"
    -DWIFI_PASS=\"${credentials.WIFI_PASSWORD}\"
    -DAPP_KEY=\"${credentials.APP_KEY}\"
    -DAPP_SECRET=\"${credentials.APP_SECRET}\"
    -DDEVICE_ID=\"${credentials.DEVICE_ID}\"
    -DARDUINO_ESP32_DEV